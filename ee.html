<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TrackFlow | Отслеживание посылок</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0d0d15; min-height: 100vh; overflow-x: hidden; color: #ffffff; }
        
        .animated-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: radial-gradient(circle at 30% 20%, #1a1a2e, #0f0f1a, #0a0a10);
            animation: slowBreathing 12s ease infinite alternate;
        }
        @keyframes slowBreathing {
            0% { opacity: 0.7; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        .particle-field { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .particle {
            position: absolute; background: rgba(139, 92, 246, 0.15); border-radius: 50%;
            animation: floatParticle 25s infinite linear;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-20vh) translateX(100px) rotate(360deg); opacity: 0; }
        }

        .floating-icon { position: fixed; z-index: 0; opacity: 0.08; pointer-events: none; animation: floatIcon 22s infinite ease-in-out; color: #a78bfa; }
        @keyframes floatIcon {
            0%,100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
            33% { transform: translateY(-30px) translateX(15px) rotate(5deg); }
            66% { transform: translateY(20px) translateX(-10px) rotate(-3deg); }
        }
        .floating-icon i { font-size: 70px; }
        .f1 { top: 12%; left: 3%; animation-duration: 18s; }
        .f2 { bottom: 15%; right: 4%; animation-duration: 24s; animation-delay: 2s; }
        .f3 { top: 45%; right: 12%; animation-duration: 20s; animation-delay: 5s; }
        .f4 { bottom: 35%; left: 8%; animation-duration: 26s; animation-delay: 1s; }
        .f5 { top: 70%; left: 20%; animation-duration: 16s; animation-delay: 7s; }
        .f6 { top: 20%; right: 25%; animation-duration: 28s; animation-delay: 4s; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; z-index: 2; }

        .navbar {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;
            padding: 14px 28px; background: rgba(20, 20, 35, 0.75); backdrop-filter: blur(12px);
            border-radius: 60px; margin-bottom: 32px; border: 1px solid rgba(139, 92, 246, 0.25);
        }

        .logo-text { font-size: 22px; font-weight: 700; color: #ffffff; letter-spacing: -0.3px; }
        .logo-text span { color: #a78bfa; }

        .nav-link {
            color: #c4b5fd; padding: 8px 22px; border-radius: 40px;
            transition: 0.25s; cursor: pointer; font-weight: 500; font-size: 14px;
        }
        .nav-link:hover { background: rgba(139, 92, 246, 0.2); color: #ffffff; }

        .notification-bell { position: relative; cursor: pointer; padding: 8px 12px; border-radius: 40px; transition: 0.25s; }
        .notification-bell:hover { background: rgba(139, 92, 246, 0.2); }
        .notification-bell i { font-size: 20px; color: #c4b5fd; }
        .notification-badge {
            position: absolute; top: 0; right: 0; background: #ef4444; color: white;
            border-radius: 50%; width: 18px; height: 18px; font-size: 10px;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
        .notification-dropdown {
            position: absolute; top: 50px; right: 0; background: #1a1a2e; border-radius: 20px;
            width: 300px; max-height: 400px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(139,92,246,0.3); z-index: 100; display: none;
        }
        .notification-dropdown.show { display: block; }
        .notification-item { padding: 12px 16px; border-bottom: 1px solid rgba(139,92,246,0.15); cursor: pointer; color: #e2e8f0; }
        .notification-item:hover { background: rgba(139,92,246,0.1); }
        .notification-item.unread { background: rgba(139,92,246,0.2); }
        .notification-title { font-weight: 600; color: #ffffff; margin-bottom: 4px; }
        .notification-text { font-size: 12px; color: #c4b5fd; }
        .notification-time { font-size: 10px; color: #888; margin-top: 4px; }

        .glass-card {
            background: rgba(25, 25, 40, 0.7); backdrop-filter: blur(12px);
            border-radius: 28px; padding: 28px; margin-bottom: 28px;
            border: 1px solid rgba(139, 92, 246, 0.2); transition: 0.25s;
            color: #ffffff;
        }
        .glass-card:hover { border-color: rgba(139, 92, 246, 0.4); background: rgba(30, 30, 48, 0.75); }

        h2 { font-size: 24px; margin-bottom: 20px; color: #ffffff; font-weight: 600; }
        h3 { font-size: 18px; margin-bottom: 10px; color: #ffffff; font-weight: 500; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; color: #c4b5fd; font-size: 13px; font-weight: 500; }
        input, select, textarea {
            width: 100%; padding: 14px 18px; background: rgba(15, 15, 25, 0.9);
            border: 1px solid rgba(139, 92, 246, 0.35); border-radius: 20px;
            color: #ffffff; font-size: 14px; transition: 0.2s;
        }
        input::placeholder { color: #a0a0c0; }
        input:focus, select:focus { outline: none; border-color: #a78bfa; box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15); }

        .btn {
            padding: 12px 28px; border-radius: 40px; font-weight: 600; font-size: 14px;
            cursor: pointer; transition: 0.25s; border: none;
        }
        .btn-primary { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; }
        .btn-primary:hover { background: #6d28d9; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid rgba(139, 92, 246, 0.5); color: #c4b5fd; }
        .btn-outline:hover { background: rgba(139, 92, 246, 0.15); border-color: #a78bfa; }
        .btn-danger { background: rgba(220, 70, 70, 0.2); border: 1px solid rgba(220, 70, 70, 0.4); color: #f87171; }
        .btn-danger:hover { background: rgba(220, 70, 70, 0.35); }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .btn-block { width: 100%; }

        .parcels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .parcel-card {
            background: rgba(25, 25, 42, 0.65); border-radius: 24px; padding: 20px;
            border-left: 3px solid #a78bfa; transition: 0.25s; cursor: pointer;
            color: #ffffff;
        }
        .parcel-card:hover { background: rgba(35, 35, 55, 0.8); transform: translateX(3px); }

        .status {
            display: inline-block; padding: 4px 12px; border-radius: 40px;
            font-size: 11px; font-weight: 600;
            color: white;
        }
        .status-pending { background: rgba(245, 158, 11, 0.18); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
        .status-transit { background: rgba(139, 92, 246, 0.2); color: #c4b5fd; border: 1px solid rgba(139,92,246,0.35); }
        .status-delivered { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }

        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .text-muted { font-size: 12px; color: #c4b5fd; margin-top: 8px; }

        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(14px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: #1a1a2e; border-radius: 32px; max-width: 550px; width: 90%;
            padding: 28px; border: 1px solid rgba(139,92,246,0.35);
            max-height: 85vh; overflow-y: auto;
            color: #ffffff;
        }

        .log-area {
            background: rgba(0,0,0,0.4); border-radius: 20px; padding: 14px;
            max-height: 200px; overflow: auto; font-family: monospace; font-size: 11px; color: #c4b5fd;
        }
        .log-entry { margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid rgba(139,92,246,0.15); color: #c4b5fd; }

        .toast {
            position: fixed; bottom: 24px; right: 24px; background: rgba(26,26,46,0.95);
            backdrop-filter: blur(12px); border-left: 3px solid #a78bfa;
            border-radius: 14px; padding: 12px 20px; color: #ffffff; z-index: 2000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .detail-block {
            background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px; margin: 16px 0;
        }
        .detail-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .detail-row:last-child { border-bottom: none; }
        .detail-icon { width: 32px; color: #a78bfa; font-size: 18px; }
        .detail-label { color: #c4b5fd; font-weight: 500; width: 100px; }
        .detail-value { color: #ffffff; font-weight: 500; flex: 1; }

        .event-item { padding: 12px; border-bottom: 1px solid rgba(139,92,246,0.15); }
        .event-time { color: #a78bfa; font-size: 12px; margin-bottom: 6px; }
        .event-desc { color: #ffffff; font-size: 14px; }

        .product-image {
            width: 100%; aspect-ratio: 1 / 1; object-fit: contain;
            background: rgba(0,0,0,0.3); border-radius: 20px; margin-bottom: 16px;
        }
        .product-image-placeholder {
            width: 100%; aspect-ratio: 1 / 1; background: rgba(139,92,246,0.15);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 48px; color: #a78bfa; margin-bottom: 16px;
        }

        .tracking-form { max-width: 500px; margin: 0 auto; text-align: center; }
        .role-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            background: rgba(139, 92, 246, 0.2); color: #c4b5fd; font-size: 12px;
        }

        .auth-tabs {
            display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 1px solid rgba(139,92,246,0.2);
        }
        .auth-tab {
            flex: 1; text-align: center; padding: 12px; cursor: pointer;
            color: #a0a0b5; transition: 0.25s;
        }
        .auth-tab.active { color: #c4b5fd; border-bottom: 2px solid #a78bfa; }

        .rating-stars { display: flex; gap: 8px; margin: 12px 0; cursor: pointer; }
        .star { font-size: 28px; color: #4b5563; transition: 0.2s; }
        .star.active { color: #fbbf24; }

        .review-item {
            background: rgba(0,0,0,0.3); border-radius: 16px; padding: 12px; margin-bottom: 12px;
        }
        .review-text { color: #ffffff; margin-top: 8px; }

        .saved-parcels-list { display: flex; flex-direction: column; gap: 12px; }
        .saved-parcel-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: rgba(139,92,246,0.15); border-radius: 16px; cursor: pointer;
            border: 1px solid rgba(139,92,246,0.3);
        }
        .saved-parcel-item:hover { background: rgba(139,92,246,0.25); }
        .saved-parcel-info { flex: 1; }
        .saved-parcel-track { font-weight: 600; color: #a78bfa; }
        .saved-parcel-name { font-size: 14px; margin-top: 2px; color: #e2e8f0; }
        .remove-saved { color: #f87171; cursor: pointer; padding: 5px 10px; }
        .remove-saved:hover { background: rgba(239,68,68,0.2); border-radius: 20px; }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .navbar { flex-direction: column; text-align: center; border-radius: 32px; }
            .detail-label { width: 80px; }
            .notification-dropdown { width: 280px; right: -40px; }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="particle-field" id="particleField"></div>
    <div class="floating-icon f1"><i class="fas fa-box"></i></div>
    <div class="floating-icon f2"><i class="fas fa-truck"></i></div>
    <div class="floating-icon f3"><i class="fas fa-map-marker-alt"></i></div>
    <div class="floating-icon f4"><i class="fas fa-clipboard-list"></i></div>
    <div class="floating-icon f5"><i class="fas fa-globe"></i></div>
    <div class="floating-icon f6"><i class="fas fa-chart-line"></i></div>

    <div id="app"></div>

    <script>
        function createParticles() {
            const container = document.getElementById('particleField');
            if (!container) return;
            for (let i = 0; i < 80; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 20 + 15 + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.background = `rgba(139, 92, 246, ${Math.random() * 0.2 + 0.05})`;
                container.appendChild(particle);
            }
        }
        createParticles();

        function initData() {
            if (!localStorage.getItem('users')) {
                localStorage.setItem('users', JSON.stringify([
                    { id: 1, email: 'client@track.flow', password: 'client123', role: 'client', name: 'Иван Клиент' },
                    { id: 2, email: 'supplier@track.flow', password: 'supplier123', role: 'supplier', name: 'Петр Поставщик' }
                ]));
                localStorage.setItem('nextUserId', '3');
            }
            if (!localStorage.getItem('parcels')) {
                const parcels = [
                    { id: 1, name: 'MacBook Pro 14"', trackingNumber: 'BY100001', status: 'transit', userId: 1, createdAt: new Date().toISOString(), weight: '2.1', cost: '1599', description: 'Новый MacBook Pro с чипом M3, 16GB RAM, 512GB SSD', imageUrl: '' },
                    { id: 2, name: 'Google Pixel 8', trackingNumber: 'BY100002', status: 'pending', userId: 1, createdAt: new Date().toISOString(), weight: '0.5', cost: '699', description: 'Смартфон Google Pixel 8, 128GB, черный', imageUrl: '' },
                    { id: 3, name: 'Коллекция книг', trackingNumber: 'BY100003', status: 'delivered', userId: 1, createdAt: new Date().toISOString(), weight: '3.2', cost: '120', description: 'Набор из 5 книг по программированию', imageUrl: '' }
                ];
                localStorage.setItem('parcels', JSON.stringify(parcels));
                localStorage.setItem('nextParcelId', '4');
            }
            if (!localStorage.getItem('events')) {
                const events = [
                    { id: 1, parcelId: 1, description: 'Посылка отправлена из Минска', timestamp: new Date().toISOString() },
                    { id: 2, parcelId: 1, description: 'Прибыла в сортировочный центр', timestamp: new Date().toISOString() },
                    { id: 3, parcelId: 2, description: 'Посылка зарегистрирована', timestamp: new Date().toISOString() },
                    { id: 4, parcelId: 3, description: 'Доставлена получателю', timestamp: new Date().toISOString() }
                ];
                localStorage.setItem('events', JSON.stringify(events));
                localStorage.setItem('nextEventId', '5');
            }
            if (!localStorage.getItem('reviews')) {
                localStorage.setItem('reviews', JSON.stringify([]));
                localStorage.setItem('nextReviewId', '1');
            }
            if (!localStorage.getItem('savedParcels')) {
                localStorage.setItem('savedParcels', JSON.stringify({}));
            }
            if (!localStorage.getItem('notifications')) {
                localStorage.setItem('notifications', JSON.stringify({}));
            }
        }

        function getUsers() { return JSON.parse(localStorage.getItem('users')); }
        function getParcels() { return JSON.parse(localStorage.getItem('parcels')); }
        function getEvents() { return JSON.parse(localStorage.getItem('events')); }
        function getReviews() { return JSON.parse(localStorage.getItem('reviews')); }
        function getSavedParcels() { return JSON.parse(localStorage.getItem('savedParcels')); }
        function getNotifications() { return JSON.parse(localStorage.getItem('notifications')); }
        function saveParcels(data) { localStorage.setItem('parcels', JSON.stringify(data)); }
        function saveEvents(data) { localStorage.setItem('events', JSON.stringify(data)); }
        function saveReviews(data) { localStorage.setItem('reviews', JSON.stringify(data)); }
        function saveSavedParcels(data) { localStorage.setItem('savedParcels', JSON.stringify(data)); }
        function saveNotifications(data) { localStorage.setItem('notifications', JSON.stringify(data)); }

        let currentUser = null;
        let parcels = [];
        let logs = [];
        let notifications = [];
        let savedParcels = [];

        function addLog(action, detail) {
            logs.unshift({ time: new Date().toLocaleTimeString(), action, detail });
            if (logs.length > 50) logs.pop();
            updateLogs();
        }
        function updateLogs() {
            const logDiv = document.getElementById('logArea');
            if (logDiv) {
                if (logs.length === 0) logDiv.innerHTML = '<div style="color:#888; text-align:center;">Журнал пуст</div>';
                else logDiv.innerHTML = logs.map(l => `<div class="log-entry">[${l.time}] <strong>${l.action}</strong>: ${l.detail}</div>`).join('');
            }
        }
        function clearLogs() { logs = []; updateLogs(); addLog('Очистка', 'Журнал очищен'); }

        function addNotification(parcelId, message) {
            const allNotifications = getNotifications();
            if (!allNotifications[currentUser?.id]) allNotifications[currentUser.id] = [];
            const newNotif = { id: Date.now(), parcelId: parcelId, message: message, timestamp: new Date().toISOString(), read: false };
            allNotifications[currentUser.id].unshift(newNotif);
            saveNotifications(allNotifications);
            showToast(message, 'info');
            updateNotificationBell();
            addLog('Уведомление', message);
        }

        function updateNotificationBell() {
            const allNotifications = getNotifications();
            const userNotifs = allNotifications[currentUser?.id] || [];
            const unreadCount = userNotifs.filter(n => !n.read).length;
            const badge = document.getElementById('notificationBadge');
            if (badge) {
                if (unreadCount > 0) { badge.style.display = 'flex'; badge.textContent = unreadCount > 9 ? '9+' : unreadCount; }
                else { badge.style.display = 'none'; }
            }
        }

        function loadUserData() {
            if (!currentUser) return;
            const allSaved = getSavedParcels();
            savedParcels = allSaved[currentUser.id] || [];
            const allNotifications = getNotifications();
            notifications = allNotifications[currentUser.id] || [];
        }

        function saveUserData() {
            if (!currentUser) return;
            const allSaved = getSavedParcels();
            allSaved[currentUser.id] = savedParcels;
            saveSavedParcels(allSaved);
        }

        function addSavedParcel(trackingNumber) {
            if (!savedParcels.includes(trackingNumber)) {
                savedParcels.push(trackingNumber);
                saveUserData();
                addLog('Добавление', `трек ${trackingNumber} в сохранённые`);
                showToast('Посылка добавлена в отслеживаемые', 'success');
                render();
            }
        }

        function removeSavedParcel(trackingNumber) {
            savedParcels = savedParcels.filter(t => t !== trackingNumber);
            saveUserData();
            addLog('Удаление', `трек ${trackingNumber} из сохранённых`);
            render();
        }

        function checkStatusChanges() {
            const allParcels = getParcels();
            const allNotifications = getNotifications();
            if (!allNotifications.statusHistory) allNotifications.statusHistory = {};
            for (let track of savedParcels) {
                const parcel = allParcels.find(p => p.trackingNumber === track);
                if (parcel) {
                    const lastStatus = allNotifications.statusHistory[track];
                    if (lastStatus && lastStatus !== parcel.status) {
                        let statusText = parcel.status === 'pending' ? 'Ожидает отправки' : parcel.status === 'transit' ? 'В пути' : 'Доставлена';
                        addNotification(parcel.id, `Статус посылки ${parcel.name} изменился на "${statusText}"`);
                    }
                    allNotifications.statusHistory[track] = parcel.status;
                }
            }
            saveNotifications(allNotifications);
        }

        function loadParcels() {
            const all = getParcels();
            if (currentUser?.role === 'supplier') { parcels = all; }
            else if (currentUser?.role === 'client') { parcels = all.filter(p => p.userId === currentUser.id); }
        }

        function findParcelByTracking(trackingNumber) {
            const all = getParcels();
            return all.find(p => p.trackingNumber === trackingNumber);
        }

        function getParcelEvents(parcelId) {
            return getEvents().filter(e => e.parcelId === parcelId).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
        }

        function createParcel(name, track, status, weight, cost, description, imageUrl) {
            if (!name || !track) { showToast('Заполните название и трек-номер', 'error'); return; }
            const all = getParcels();
            const nextId = parseInt(localStorage.getItem('nextParcelId'));
            all.push({ id: nextId, name, trackingNumber: track, status, userId: currentUser.id, createdAt: new Date().toISOString(), weight: weight || '—', cost: cost || '—', description: description || '—', imageUrl: imageUrl || '' });
            saveParcels(all);
            localStorage.setItem('nextParcelId', (nextId + 1).toString());
            const events = getEvents();
            const nextEid = parseInt(localStorage.getItem('nextEventId'));
            events.push({ id: nextEid, parcelId: nextId, description: 'Посылка создана поставщиком', timestamp: new Date().toISOString() });
            saveEvents(events);
            localStorage.setItem('nextEventId', (nextEid + 1).toString());
            loadParcels();
            addLog('Создание', `${name} (${track})`);
            showToast('Посылка добавлена', 'success');
            render();
        }

        function updateStatus(pid, newStatus) {
            const all = getParcels();
            const idx = all.findIndex(p => p.id === pid);
            if (idx !== -1) {
                const oldStatus = all[idx].status;
                all[idx].status = newStatus;
                saveParcels(all);
                const events = getEvents();
                const nextId = parseInt(localStorage.getItem('nextEventId'));
                events.push({ id: nextId, parcelId: pid, description: `Статус изменён: ${oldStatus} → ${newStatus}`, timestamp: new Date().toISOString() });
                saveEvents(events);
                localStorage.setItem('nextEventId', (nextId + 1).toString());
                loadParcels();
                addLog('Обновление', `ID ${pid} → ${newStatus}`);
                showToast('Статус обновлён', 'success');
                const parcel = all[idx];
                if (parcel.userId !== currentUser.id) {
                    const allNotifications = getNotifications();
                    if (!allNotifications[parcel.userId]) allNotifications[parcel.userId] = [];
                    allNotifications[parcel.userId].unshift({
                        id: Date.now(), parcelId: pid,
                        message: `Статус посылки ${parcel.name} изменён на "${newStatus === 'pending' ? 'Ожидает' : newStatus === 'transit' ? 'В пути' : 'Доставлена'}"`,
                        timestamp: new Date().toISOString(), read: false
                    });
                    saveNotifications(allNotifications);
                }
                render();
            }
        }

        function deleteParcel(pid) {
            if (!confirm('Удалить посылку?')) return;
            let all = getParcels();
            all = all.filter(p => p.id !== pid);
            saveParcels(all);
            let events = getEvents();
            events = events.filter(e => e.parcelId !== pid);
            saveEvents(events);
            let reviews = getReviews();
            reviews = reviews.filter(r => r.parcelId !== pid);
            saveReviews(reviews);
            loadParcels();
            addLog('Удаление', `ID ${pid}`);
            showToast('Посылка удалена', 'success');
            render();
        }

        function addReview(parcelId, rating, comment) {
            const reviews = getReviews();
            const nextId = parseInt(localStorage.getItem('nextReviewId'));
            reviews.push({ id: nextId, parcelId: parcelId, userId: currentUser.id, rating: rating, comment: comment, createdAt: new Date().toISOString() });
            saveReviews(reviews);
            localStorage.setItem('nextReviewId', (nextId + 1).toString());
            addLog('Отзыв', `оценка ${rating} звезд`);
            showToast('Спасибо за отзыв!', 'success');
        }

        function register(email, password, name, role) {
            const users = getUsers();
            if (users.find(u => u.email === email)) { showToast('Пользователь с таким email уже существует', 'error'); return false; }
            const nextId = parseInt(localStorage.getItem('nextUserId'));
            const newUser = { id: nextId, email, password, role, name: name || email.split('@')[0] };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('nextUserId', (nextId + 1).toString());
            currentUser = newUser;
            loadParcels();
            addLog('Регистрация', `${email} (${role === 'client' ? 'Клиент' : 'Поставщик'})`);
            showToast(`Добро пожаловать, ${newUser.name}!`, 'success');
            render();
            return true;
        }

        function login(email, password, role) {
            const users = getUsers();
            const user = users.find(u => u.email === email && u.password === password && u.role === role);
            if (!user) { showToast('Неверный email, пароль или роль', 'error'); return false; }
            currentUser = user;
            loadParcels();
            loadUserData();
            checkStatusChanges();
            addLog('Вход', `${email} (${role === 'client' ? 'Клиент' : 'Поставщик'})`);
            showToast(`Добро пожаловать, ${user.name}!`, 'success');
                        render();
            return true;
        }

                        <div class="detail-row"><div class="detail-icon"><i class="fas fa-weight-hanging"></i></div><div class="detail-label">Вес</div><div class="detail-value">${parcel.weight} кг</div></div>
                        <div class="detail-row"><div class="detail-icon"><i class="fas fa-dollar-sign"></i></div><div class="detail-label">Стоимость</div><div class="detail-value">${parcel.cost} $</div></div>
                        <div class="detail-row"><div class="detail-icon"><i class="fas fa-align-left"></i></div><div class="detail-label">Описание</div><div class="detail-value">${parcel.description}</div></div>
                        <div class="detail-row"><div class="detail-icon"><i class="fas fa-calendar"></i></div><div class="detail-label">Дата создания</div><div class="detail-value">${new Date(parcel.createdAt).toLocaleDateString()}</div></div>

                stars.forEach((star, idx) => {

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}" style="margin-right: 8px;"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(str) { 
            if (!str) return ''; 
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); 
        }

        function toggleNotifications() {
            const dropdown = document.getElementById('notificationDropdown');
            if (dropdown) {
                dropdown.classList.toggle('show');
                if (dropdown.classList.contains('show')) {
                    const allNotifications = getNotifications();
                    if (allNotifications[currentUser?.id]) {
                        allNotifications[currentUser.id].forEach(n => n.read = true);
                        saveNotifications(allNotifications);
                        updateNotificationBell();
                        render();
                    }
                }
            }
        }

        function markNotificationRead(notifId) {
            const allNotifications = getNotifications();
            const notif = allNotifications[currentUser.id]?.find(n => n.id === notifId);
            if (notif) notif.read = true;
            saveNotifications(allNotifications);
            updateNotificationBell();
            render();
        }

        function clearAllNotifications() {
            if (confirm('Очистить все уведомления?')) {
                const allNotifications = getNotifications();
                allNotifications[currentUser.id] = [];
                saveNotifications(allNotifications);
                updateNotificationBell();
                render();
                showToast('Уведомления очищены', 'success');

                                            <option value="pending" ${p.status === 'pending' ? 'selected' : ''}>Ожидает</option>
                                            <option value="transit" ${p.status === 'transit' ? 'selected' : ''}>В пути</option>
                                            <option value="delivered" ${p.status === 'delivered' ? 'selected' : ''}>Доставлено</option>
                                        </select>
                                        <button class="btn-danger btn-sm" onclick="event.stopPropagation(); deleteParcel(${p.id})"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="glass-card">
                            <div class="flex-between"><h2><i class="fas fa-terminal"></i> Журнал действий</h2><button class="btn-outline btn-sm" onclick="clearLogs()"><i class="fas fa-eraser"></i> Очистить</button></div>
                            <div id="logArea" class="log-area"></div>
                        </div>
                    </div>
                `;

                document.getElementById('createBtn')?.addEventListener('click', () => {
                    const name = document.getElementById('parcelName').value;
                    const track = document.getElementById('parcelTrack').value;
                    const status = document.getElementById('parcelStatus').value;
                    const weight = document.getElementById('parcelWeight').value;
                    const cost = document.getElementById('parcelCost').value;
                    const imageUrl = document.getElementById('parcelImage').value;
                    const desc = document.getElementById('parcelDesc').value;
                    createParcel(name, track, status, weight, cost, desc, imageUrl);
                    document.getElementById('parcelName').value = '';
                    document.getElementById('parcelTrack').value = '';
                    document.getElementById('parcelWeight').value = '';
                    document.getElementById('parcelCost').value = '';
                    document.getElementById('parcelImage').value = '';
                    document.getElementById('parcelDesc').value = '';
                });
                document.querySelectorAll('.status-select').forEach(sel => {
                    sel.addEventListener('change', (e) => {
                        e.stopPropagation();
                        updateStatus(parseInt(sel.dataset.id), sel.value);
                    });
                });
            }
            updateLogs();
        }

        window.showParcelDetails = showParcelDetails;
        window.deleteParcel = deleteParcel;
        window.clearLogs = clearLogs;
        window.logout = logout;
        window.addSavedParcel = addSavedParcel;
        window.removeSavedParcel = removeSavedParcel;
        window.toggleNotifications = toggleNotifications;
        window.markNotificationRead = markNotificationRead;
        window.clearAllNotifications = clearAllNotifications;

        initData();
        render();
    </script>
</body>
</html>
